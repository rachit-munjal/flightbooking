<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Booking — Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 28px; color: #667eea; }
        .logo p { color: #888; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; font-weight: 500; }
        input {
            width: 100%; padding: 12px 16px;
            border: 2px solid #e1e5e9; border-radius: 8px;
            font-size: 14px; outline: none; transition: border-color 0.3s;
        }
        input:focus { border-color: #667eea; }
        button {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        .link { text-align: center; margin-top: 20px; font-size: 14px; color: #888; }
        .link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .error { background: #fee; color: #c00; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; display: none; }
        .success { background: #efe; color: #070; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>✈️ SkyBook</h1>
        <p>Create your account</p>
    </div>

    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe">
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="john@gmail.com">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters">
    </div>
    <div class="form-group">
        <label>Phone</label>
        <input type="text" id="phone" placeholder="9876543210">
    </div>

    <button onclick="register()">Create Account</button>

    <div class="link">
        Already have an account? <a href="index.html">Login</a>
    </div>
</div>

<script>
    async function register() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const phone = document.getElementById('phone').value;

        if (!name || !email || !password || !phone) {
            showError('Please fill in all fields');
            return;
        }

        try {
            const response = await fetch('http://localhost:8080/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, phone })
            });

            const data = await response.json();

            if (response.ok) {
                showSuccess('Account created! Redirecting to login...');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                showError(data.message || 'Registration failed');
            }
        } catch (error) {
            showError('Server error. Make sure backend is running.');
        }
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('successMsg').style.display = 'none';
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('errorMsg').style.display = 'none';
    }
</script>
</body>
</html>
