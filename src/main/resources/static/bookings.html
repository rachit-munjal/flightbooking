<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyBook — My Bookings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        nav {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 16px 30px; display: flex;
            justify-content: space-between; align-items: center; color: white;
        }
        nav h1 { font-size: 22px; }
        nav div { display: flex; gap: 15px; align-items: center; }
        nav button {
            background: rgba(255,255,255,0.2); border: none;
            color: white; padding: 8px 16px; border-radius: 6px;
            cursor: pointer; font-size: 13px;
        }
        nav button:hover { background: rgba(255,255,255,0.3); }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        h2 { margin-bottom: 20px; color: #333; }
        .booking-card {
            background: white; padding: 20px 25px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            margin-bottom: 15px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .booking-info h3 { color: #333; font-size: 17px; margin-bottom: 5px; }
        .booking-info p { color: #888; font-size: 13px; margin-bottom: 3px; }
        .booking-right { text-align: right; }
        .price { font-size: 20px; font-weight: 700; color: #667eea; margin-bottom: 5px; }
        .status {
            display: inline-block; padding: 4px 12px;
            border-radius: 20px; font-size: 12px; font-weight: 600;
            margin-bottom: 10px;
        }
        .status.CONFIRMED { background: #d4edda; color: #155724; }
        .status.CANCELLED { background: #f8d7da; color: #721c24; }
        .btn-cancel {
            padding: 7px 18px; background: #dc3545;
            color: white; border: none; border-radius: 6px;
            font-size: 13px; cursor: pointer;
        }
        .btn-cancel:hover { background: #c82333; }
        .empty { text-align: center; padding: 60px; color: #888; font-size: 16px; }
        .toast {
            position: fixed; bottom: 30px; right: 30px;
            padding: 14px 20px; border-radius: 10px;
            font-size: 14px; font-weight: 500; color: white;
            display: none; z-index: 1000;
        }
        .toast.success { background: #28a745; }
        .toast.error { background: #dc3545; }
    </style>
</head>
<body>

<nav>
    <h1>✈️ SkyBook</h1>
    <div>
        <button onclick="location.href='dashboard.html'">Search Flights</button>
        <button onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container">
    <h2>🎫 My Bookings</h2>
    <div id="bookingsList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    async function loadBookings() {
        try {
            const response = await fetch('http://localhost:8080/api/bookings/my-bookings', {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            const data = await response.json();

            if (response.ok) {
                displayBookings(data);
            } else {
                showToast('Failed to load bookings', 'error');
            }
        } catch (error) {
            showToast('Server error', 'error');
        }
    }

    function displayBookings(bookings) {
        const list = document.getElementById('bookingsList');

        if (!bookings || bookings.length === 0) {
            list.innerHTML = '<div class="empty">No bookings yet. <a href="dashboard.html">Search flights</a></div>';
            return;
        }

        list.innerHTML = bookings.map(b => `
            <div class="booking-card">
                <div class="booking-info">
                    <h3>${b.airline} — ${b.flightNumber}</h3>
                    <p>📍 ${b.source} → ${b.destination}</p>
                    <p>🕐 ${b.departureTime}</p>
                    <p>💺 ${b.seatsBooked} seat(s)</p>
                </div>
                <div class="booking-right">
                    <div class="price">₹${b.totalPrice}</div>
                    <div class="status ${b.status}">${b.status}</div>
                    <br>
                    ${b.status === 'CONFIRMED' ?
            `<button class="btn-cancel" onclick="cancelBooking(${b.id})">Cancel</button>`
            : ''}
                </div>
            </div>
        `).join('');
    }

    async function cancelBooking(bookingId) {
        if (!confirm('Are you sure you want to cancel this booking?')) return;

        try {
            const response = await fetch(`http://localhost:8080/api/bookings/cancel/${bookingId}`, {
                method: 'PUT',
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.ok) {
                showToast('Booking cancelled successfully', 'success');
                loadBookings();
            } else {
                const data = await response.json();
                showToast(data.message || 'Cancel failed', 'error');
            }
        } catch (error) {
            showToast('Server error', 'error');
        }
    }

    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast ${type}`;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    loadBookings();
</script>
</body>
</html>
