spring:
  application:
    name: flightbooking

  datasource:
    url: jdbc:mysql://localhost:3306/flight_booking_db
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

app:
  jwt:
    secret: mynameisrachitmunjalthisissecretkey
    expiration: 86400000

logging:
  level:
    com.practice.flightbooking: DEBUG
  file:
    name: logs/flight-booking.log
  pattern:
#    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"